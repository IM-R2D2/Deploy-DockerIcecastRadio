###################################
## -- EXAMPLE FOR NGINX -- ##
###################################
##############################################################
map $uri $audio_type {
    default                          audio/mpeg;
    ~^/afrodita_radio                audio/mpeg;
    ~\.mp3$                          audio/mpeg;
    ~\.aac$                          audio/aac;
    ~\.aacp$                         audio/aacp;
    ~\.ogg$                          audio/ogg;
    ~\.opus$                         audio/ogg;
    ~\.webm$                         audio/webm;
    ~\.flac$                         audio/flac;
    ~\.m3u8$                         application/vnd.apple.mpegurl;
    ~\.ts$                           video/mp2t;
}
##### NO SSL REDIRECT #####################
server {
   listen 80;
    if ($host = ${DOMAIN_NAME}) {
        return 301 https://$host$request_uri;
    }


    server_name afrodita.techit.pro;

    # Allow access for ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
        default_type "text/plain";
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

################## HTTP SSL ###########################

server {
  server_name ${DOMAIN_NAME};
  listen 443 ssl;

    limit_conn addr 100;
    client_max_body_size 1M;

    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 5s 5s;
    send_timeout 10s;

    access_log /usr/local/bin/docker/${PROJECT_NAME}/logs/nginx/access.log main;
    error_log  /usr/local/bin/docker/${PROJECT_NAME}/logs/nginx/error.log warn;

    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem; # managed by Certbot
    #include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    #ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    ssl_dhparam /etc/nginx/dhparam.pem;
    ssl_ecdh_curve X25519:secp384r1:prime256v1;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    ssl_session_timeout 5m;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling off;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

# Enable this if you want HSTS (recommended)
    add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Permitted-Cross-Domain-Policies "none";
    add_header X-Download-Options "noopen";
    add_header Expect-CT "enforce, max-age=86400, report-uri='https://your-report-uri'";
    add_header X-Content-Type-Options nosniff;
    add_header Content-Security-Policy "default-src 'self';";
    add_header X-Xss-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), fullscreen=(self)";

##################################################################################################################

location ~ ^/${NAME_MAIN_MOUNT}|${NAME_FALLBACK_MOUNT}$ {
    #limit_req zone=one burst=100 nodelay;
    #limit_conn addr 50;

        if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Icy-MetaData" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0 always;
                add_header Content-Type text/plain always;
                return 204;
        }
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        #proxy_hide_header Access-Control-Expose-Headers;

        add_header Cache-Control "no-store" always;
        #add_header Content-Type $audio_type always;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Icy-MetaData" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        add_header Access-Control-Expose-Headers "icy-metaint, icy-br, icy-name, icy-genre, icy-url, icy-pub" always;


        #add_header Accept-Ranges bytes always;

        # Settings proxy
        proxy_http_version 1.0;

        #proxy_force_ranges on;

        proxy_pass_header icy-metaint;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_buffers 8 16k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 64k;

        proxy_max_temp_file_size 0;
        proxy_temp_path /dev/null;
        proxy_cache off;
        proxy_cache_bypass $http_pragma;
        proxy_no_cache $http_pragma;

        #chunked_transfer_encoding off;
        client_max_body_size 0;
        proxy_read_timeout 600;
        proxy_send_timeout 600;

        proxy_redirect http:// https://;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Accept-Encoding "";
        proxy_set_header X-Forwarded-Proto $scheme;

        # Do not add Icy-MetaData here; it may break the stream

        # Proxy to Icecast server
        proxy_pass_request_headers on;
        proxy_pass http://127.0.0.1:${PORT_ICECAST_EXTERNAL};
}

location / {
   #allow ${ALLOWED_IP_ADDRESSES}; # Uncomment this if you want to allow specific IP addresses
#    deny all;
#    error_page 403 = @redirect;

   # Blocked some strange user-agent
   if ($http_user_agent ~* "(BotPoke|Hello World|sqlmap|crawl|bot|scan|spider|badbot|botsearch|badbot)") {
       return 444;
   }

   if ($uri ~* "\.(ht|git|env|svn|bash|ssh|php|sh|pl|py)($|\?)") {
      return 444;
   }

   if ($uri ~* "(xmlrpc\.php|wp-login\.php|.asp|git|env|htaccess|sql|sqlite|phpunit)") {
      return 444;
   }

   if ($query_string ~* "`|;|&|>|<") {
     return 444;
   }

   limit_req zone=one burst=20 nodelay;
   limit_conn addr 20; # The two streams per host

   proxy_http_version 1.1;
   proxy_buffering off;

   chunked_transfer_encoding off;
   proxy_redirect     off;
   proxy_cache off;
   #add_header Cache-Control "no-store";

   proxy_set_header   Host             $host;
   proxy_set_header   X-Real-IP        $remote_addr;
   proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
   #proxy_set_header   X-Forwarded-For $remote_addr;
   proxy_set_header Authorization $http_authorization;
   proxy_set_header Accept-Encoding "";
   proxy_set_header   X-Forwarded-Proto $scheme;

   ##add_header Access-Control-Allow-Origin "*"; # Dont use. This's Remover metadata!
   add_header Access-Control-Allow-Methods "GET, OPTIONS";

   #proxy_hide_header Content-Type;
   #add_header Content-Type "audio/aacp";

   client_max_body_size 0;
   proxy_read_timeout 600;
   proxy_send_timeout 600;
   proxy_pass http://127.0.0.1:${PORT_ICECAST_EXTERNAL};
   }


location ~ /\. {
        deny all;
}


# main redirect
location @redirect {
    return 301 https://${DOMAIN_NAME}/index.html;
  }
}
